<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="Andy Reff portfolio concept with a precision-built editorial hero."
        />

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap"
            rel="stylesheet"
        />

        <link rel="stylesheet" href="../CSS/style.css" />

        <title>Jefferson</title>
    </head>
    <body>
        <div class="page-shell">
            <svg
                class="drag-tether-layer"
                id="dragTetherLayer"
                aria-hidden="true"
            >
                <line class="drag-tether-line" id="dragTetherLine" />
            </svg>

            <div class="drag-indicator" id="dragIndicator" aria-hidden="true">
                <span class="drag-indicator-readout" id="dragIndicatorReadout">
                    dx: 0, dy: 0
                </span>
            </div>

            <header class="site-header">
                <a class="brand" href="#hero">JEFFERSON</a>
                <p class="header-clock" id="clock">Manila, PH - --:--:-- PHT</p>
                <nav class="site-nav" aria-label="Primary">
                    <a href="#work">WORK</a>
                    <a href="#about">ABOUT</a>
                </nav>
            </header>

            <main>
                <section class="stack-transition" id="hero">
                    <div class="stack-stage" id="stackStage">
                        <section class="hero hero-panel">
                            <div class="hero-copy-wrap">
                                <p class="hero-kicker">
                                    NAVIGATING THE UNKNOWN, PIXEL BY PIXEL.
                                </p>
                            </div>

                            <div class="wordmark-stage">
                                <div class="wordmark-layout">
                                    <div
                                        class="wordmark-panel wordmark-panel-solid draggable-wordmark"
                                        data-draggable-wordmark
                                    >
                                        <span class="drag-chip" id="dragChip">
                                            DRAG TO MOVE
                                        </span>
                                        <span class="wordmark-text">JEFF</span>
                                    </div>
                                    <div
                                        class="wordmark-panel wordmark-panel-outline draggable-wordmark"
                                        data-draggable-wordmark
                                    >
                                        <span class="wordmark-text">ERSON</span>
                                    </div>
                                </div>
                            </div>

                            <p
                                class="hero-description"
                                id="heroDescription"
                                data-typewriter-phrases="Precision structure, bold creative vision.|Systems built with clarity, rhythm, and motion.|Bold creative direction, measured down to the pixel."
                            >
                                Precision structure, bold creative vision.
                            </p>
                        </section>

                        <section
                            class="reveal-panel"
                            id="work"
                            aria-labelledby="workStatement"
                        >
                            <div class="reveal-panel-inner">
                                <p class="reveal-index" id="workIndex">01</p>

                                <div class="reveal-editor" id="workEditor">
                                    <span class="reveal-editor-label">
                                        P / Statement 01
                                    </span>

                                    <div
                                        class="reveal-message"
                                        id="workStatement"
                                        aria-live="off"
                                    >
                                        <p class="reveal-line">
                                            <span
                                                class="reveal-segment"
                                                data-scroll-text="I design for those who crave"
                                            ></span>
                                        </p>
                                        <p class="reveal-line">
                                            <span
                                                class="reveal-segment reveal-segment-accent"
                                                data-scroll-text="clarity"
                                            ></span>
                                            <span
                                                class="reveal-segment"
                                                data-scroll-text=" without sacrificing"
                                            ></span>
                                        </p>
                                        <p class="reveal-line">
                                            <span
                                                class="reveal-segment reveal-segment-accent"
                                                data-scroll-text="energy."
                                            ></span>
                                        </p>
                                    </div>

                                    <span class="reveal-editor-status">
                                        content -> editing...
                                    </span>
                                </div>
                            </div>
                        </section>
                    </div>
                </section>
            </main>

            <a class="ask-pill" href="#work">
                <span class="ask-pill-icon">+</span>
                <span>Ask my work</span>
                <span class="ask-pill-count">8K</span>
            </a>
        </div>

        <script src="../JAVASCRIPT/script.js"></script>
    </body>
</html>
